<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Heart4Macs — Available Inventory</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .card { transition: transform .15s ease, box-shadow .15s ease; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -10px rgba(0,0,0,.15); }
  .cat-card { transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease; cursor: pointer; }
  .cat-card:hover { transform: translateY(-2px); box-shadow: 0 14px 30px -12px rgba(0,0,0,.18); border-color: rgb(59,130,246); }
  .filter-select { padding: .5rem .75rem; border: 1px solid rgb(203,213,225); border-radius: .75rem; background: white; }
  .filter-select:focus { outline: none; box-shadow: 0 0 0 2px rgb(59,130,246); }
  .brand-logo svg { display: block; }
</style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

<!-- ============ PASSWORD GATE ============ -->
<div id="gate" class="fixed inset-0 bg-slate-900 flex items-center justify-center p-6 z-50">
  <div class="max-w-sm w-full bg-white rounded-2xl shadow-xl p-8">
    <div class="text-center mb-6">
      <div class="text-4xl mb-2">🔐</div>
      <h1 class="text-xl font-semibold text-slate-900">Heart4Macs</h1>
      <p class="text-slate-500 text-sm mt-1">Enter the password to view inventory</p>
    </div>
    <form id="gate-form" class="space-y-3">
      <input id="gate-pw" type="password" autofocus placeholder="Password"
        class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" />
      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-xl">
        View Inventory
      </button>
      <p id="gate-error" class="text-red-600 text-sm text-center hidden">Wrong password. Try again.</p>
    </form>
  </div>
</div>

<!-- ============ MAIN CATALOG ============ -->
<div id="app" class="hidden">

  <!-- Header (shared) -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-40">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between gap-3">
      <div class="flex items-center gap-3 min-w-0">
        <button id="back-btn" aria-label="Back"
          class="hidden inline-flex items-center gap-1 px-3 py-2 -ml-1 rounded-full text-slate-700 hover:bg-slate-100 active:bg-slate-200 text-sm font-medium shrink-0">
          <span class="text-lg leading-none">‹</span><span>Back</span>
        </button>
        <div class="min-w-0">
          <h1 id="header-title" class="text-lg sm:text-xl font-semibold truncate">Heart4Macs</h1>
          <p id="header-sub" class="text-xs text-slate-500 truncate"></p>
        </div>
      </div>
      <a href="sms:+16467045090" target="_blank"
        class="bg-green-600 hover:bg-green-700 text-white text-sm font-medium px-4 py-2 rounded-full whitespace-nowrap shrink-0">
        💬 Text Us
      </a>
    </div>
  </header>

  <!-- CARD GRID (used for every non-item level: brands, types) -->
  <section id="cards-view" class="max-w-6xl mx-auto px-4 py-6">
    <h2 id="cards-title" class="text-base font-semibold text-slate-800 mb-3">Browse by brand</h2>
    <div id="card-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3"></div>
  </section>

  <!-- ITEM VIEW: filters + item grid -->
  <section id="items-view" class="hidden">
    <div class="bg-white border-b border-slate-200">
      <div class="max-w-6xl mx-auto px-4 py-3">
        <input id="search" type="search" placeholder="Search model, spec, or keyword…"
          class="w-full px-4 py-2.5 border border-slate-300 rounded-xl mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500" />
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-2 text-sm">
          <select id="f-year"    class="filter-select"><option value="">Any year</option></select>
          <select id="f-ram"     class="filter-select"><option value="">Any RAM</option></select>
          <select id="f-storage" class="filter-select"><option value="">Any storage</option></select>
        </div>
        <div class="flex items-center gap-4 mt-2 text-xs text-slate-600">
          <label class="flex items-center gap-1"><input id="f-charger" type="checkbox" /> Charger included</label>
          <label class="flex items-center gap-1"><input id="f-gradea" type="checkbox" /> Grade A only</label>
          <button id="clear-filters" class="ml-auto text-blue-600 hover:underline">Clear filters</button>
        </div>
      </div>
    </div>

    <main class="max-w-6xl mx-auto px-4 py-6">
      <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
      <div id="empty" class="hidden text-center py-16 text-slate-500">
        <div class="text-5xl mb-2">🔍</div>
        <p>No items match your filters.</p>
      </div>
    </main>
  </section>

  <footer class="max-w-6xl mx-auto px-4 py-8 text-center text-xs text-slate-400">
    All items are carefully tested. Price on request — text us any time.
  </footer>
</div>

  const BUSINESS = "Heart4Macs";

  // ---- Derivations ----
  function deriveBrand(item) {
    if (APPLE_CATEGORIES.includes(item.category)) return "Apple";
    const name = (item.model_name || "").toLowerCase();
    if (name.includes("samsung")) return "Samsung";
    const firstWord = (item.model_name || "").split(" ")[0];
    if (firstWord === "Samsung") return "Samsung";
    // Chromebook with Samsung in name
    if (item.category === "Chromebook") {
      if ((item.model_name || "").toLowerCase().includes("samsung")) return "Samsung";
      return "Other";
    }
    if (firstWord && /^[A-Z]/.test(firstWord) && firstWord !== "Other") return firstWord;
    return "Other";
  }

  // Derive the product type label (category-level grouping)
  function deriveType(item) {
    const cat = item.category || "";
    // Use category directly as the type label
    return cat;
  }

  function qtySum(items) { return items.reduce((s, it) => s + (it.quantity || 1), 0); }

  // Type icon mapping
  const TYPE_ICON = {
    "MacBook":   "💻",
    "iMac":      "🖥️",
    "Mac":       "🖥️",
    "Mac mini":  "🖥️",
    "iPad":      "📲",
    "iPhone":    "📱",
    "Apple TV":  "📺",
    "Display":   "🖼️",
    "Accessory": "🎧",
    "Chromebook":"💻",
    "Phone":     "📱",
  };

  // ---- Password gate ----
  async function sha256(s) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
  }
  const gate = document.getElementById("gate");
  const gateForm = document.getElementById("gate-form");
  const gatePw = document.getElementById("gate-pw");
  const gateError = document.getElementById("gate-error");
  const app = document.getElementById("app");

  gateForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const hash = await sha256(gatePw.value);
    if (hash === PASSWORD_HASH) {
      sessionStorage.setItem("catalog_unlocked", "1");
      gate.classList.add("hidden"); app.classList.remove("hidden"); renderLevel();
    } else {
      gateError.classList.remove("hidden"); gatePw.value = ""; gatePw.focus();

  const nav = { brand: null, type: null };

  const cardsView = document.getElementById("cards-view");
  const itemsView = document.getElementById("items-view");

  const cardGrid = document.getElementById("card-grid");
  const backBtn = document.getElementById("back-btn");
  const headerTitle = document.getElementById("header-title");
  const headerSub = document.getElementById("header-sub");

  backBtn.addEventListener("click", () => {
    if (nav.type)       nav.type = null;
    else if (nav.brand) nav.brand = null;
    renderLevel();
    window.scrollTo({ top: 0, behavior: "smooth" });
  });

  function setBreadcrumb() {
    const parts = [BUSINESS];
    if (nav.brand) parts.push(nav.brand);
    if (nav.type)  parts.push(String(nav.type).startsWith(nav.brand) ? nav.type : `${nav.brand} ${nav.type}`);
    headerTitle.textContent = parts[parts.length - 1];
    backBtn.classList.toggle("hidden", parts.length === 1);
    const totalQty = qtySum(currentItems());
    headerSub.textContent = nav.brand
      ? `${totalQty} available`
      : `${totalQty} items available · Updated ${GENERATED_AT}`;
  }

  function currentItems() {
    let list = ITEMS.slice();
    if (nav.brand) list = list.filter(it => deriveBrand(it) === nav.brand);
    if (nav.type)  list = list.filter(it => deriveType(it) === nav.type);
    return list;
  }

  function renderLevel() {
    // Level 1: no brand selected → show brand tiles
    if (!nav.brand) { showBrandCards(); return; }

    const inBrand = ITEMS.filter(it => deriveBrand(it) === nav.brand);

    // Level 2: brand selected, no type → show type tiles
    //   (auto-skip if only one type)
    if (!nav.type) {
      const types = [...new Set(inBrand.map(deriveType))].filter(Boolean).sort();
      if (types.length > 1) { showTypeCards(types, inBrand); return; }
      // exactly one type → fall through to items
    }

    // Level 3: items
    showItems();
  }

  // ---- Brand cards (Level 1) ----
  function showBrandCards() {
    setBreadcrumb();
    cardsTitle.textContent = "Browse by brand";
    cardGrid.innerHTML = "";
    itemsView.classList.add("hidden");
    cardsView.classList.remove("hidden");

    const brands = [...new Set(ITEMS.map(deriveBrand))].filter(Boolean).sort();
    for (const brand of brands) {
      const brandItems = ITEMS.filter(it => deriveBrand(it) === brand);
      const count = qtySum(brandItems);
      if (count === 0) continue;
      const logo = BRAND_ICON[brand] || BRAND_ICON["Other"];
      cardGrid.appendChild(brandCard(brand, logo, count, () => {
        nav.brand = brand; nav.type = null; renderLevel();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }));
    }
  }

  function brandCard(brand, logoHtml, count, onClick) {
    const el = document.createElement("button");
    el.className = "cat-card bg-white border border-slate-200 rounded-2xl p-5 text-left flex flex-col gap-3";
    el.innerHTML = `
      <div class="brand-logo text-slate-800 flex items-center" style="min-height:3rem">${logoHtml}</div>
      <div>
        <div class="font-semibold text-slate-900">${brand}</div>
        <div class="text-xs text-slate-500 mt-0.5">${count} available</div>
      </div>
    `;
    el.addEventListener("click", onClick);
    return el;
  }

  // ---- Type cards (Level 2) ----
  function showTypeCards(types, inBrand) {
    setBreadcrumb();
    cardsTitle.textContent = `${nav.brand} products`;
    cardGrid.innerHTML = "";
    itemsView.classList.add("hidden");
    cardsView.classList.remove("hidden");

    for (const type of types) {
      const typeItems = inBrand.filter(it => deriveType(it) === type);
      const count = qtySum(typeItems);
      const icon = TYPE_ICON[type] || "📦";
      // Title is brand-prefixed: e.g. "Apple MacBook", "Samsung Chromebook"
      const label = String(type).startsWith(nav.brand) ? type : `${nav.brand} ${type}`;
      cardGrid.appendChild(simpleCard(label, icon, count, () => {
        nav.type = type; renderLevel();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }));
    }
  }

  function simpleCard(label, icon, count, onClick) {
    const el = document.createElement("button");
    el.className = "cat-card bg-white border border-slate-200 rounded-2xl p-5 text-left flex flex-col gap-2";
    el.innerHTML = `
      ${icon ? `<div class="text-3xl">${icon}</div>` : ""}
      <div class="font-semibold text-slate-900">${label}</div>
      <div class="text-xs text-slate-500">${count} available</div>

    el.addEventListener("click", onClick);
    return el;
  }

  function unique(arr, key) {
    return [...new Set(arr.map(x => x[key]).filter(v => v != null && v !== ""))].sort((a, b) => {

      return String(a).localeCompare(String(b));
    });
  }
  function fillSelect(id, values, formatter = (v) => v) {
    const sel = document.getElementById(id);
    while (sel.options.length > 1) sel.remove(1);
    for (const v of values) {
      const opt = document.createElement("option");
      opt.value = v; opt.textContent = formatter(v);
      sel.appendChild(opt);
    }
  }

  function showItems() {
    setBreadcrumb();
    cardsView.classList.add("hidden");
    itemsView.classList.remove("hidden");
    const items = currentItems();
    // Reset filter values on entry
    ["search","f-year","f-ram","f-storage"].forEach(id => document.getElementById(id).value = "");
    document.getElementById("f-charger").checked = false;
    document.getElementById("f-gradea").checked = false;
    // Populate filter options scoped to the current selection
    fillSelect("f-year",    unique(items, "year"));
    fillSelect("f-ram",     unique(items, "ram"),     v => `${v} GB RAM`);
    fillSelect("f-storage", unique(items, "storage"), v => v >= 1000 ? `${v/1000} TB` : `${v} GB`);
    renderItems();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function matches(item, f) {
    if (f.search) {
      const hay = `${item.model_name||""} ${item.cpu||""} ${item.display||""} ${item.color||""}`.toLowerCase();
      if (!hay.includes(f.search)) return false;
    }
    if (f.year    && String(item.year)    !== String(f.year))    return false;
    if (f.ram     && String(item.ram)     !== String(f.ram))     return false;
    if (f.storage && String(item.storage) !== String(f.storage)) return false;
    if (f.charger && !item.has_charger) return false;
    if (f.gradea  && !item.grade_a) return false;
    return true;
  }

  function renderItems() {
    const f = {
      search:  document.getElementById("search").value.trim().toLowerCase(),
      year:    document.getElementById("f-year").value,
      ram:     document.getElementById("f-ram").value,
      storage: document.getElementById("f-storage").value,
      charger: document.getElementById("f-charger").checked,
      gradea:  document.getElementById("f-gradea").checked,
    };
    const filtered = currentItems().filter(it => matches(it, f));
    const grid = document.getElementById("grid");
    const empty = document.getElementById("empty");
    grid.innerHTML = "";
    if (filtered.length === 0) { empty.classList.remove("hidden"); return; }
    empty.classList.add("hidden");
    for (const it of filtered) grid.appendChild(itemCard(it));
  }

  function storageLabel(v) { return v >= 1000 ? `${v/1000} TB` : `${v} GB`; }
  function batteryLabel(code) {
    if (!code) return null;
    const pct = String(code).match(/(\d{1,3})/);
    if (pct) {
      const n = parseInt(pct[1], 10);
      if (n >= 0 && n <= 100) return `Battery ${n}%`;
    }
    const letterMap = { A: "Excellent battery", B: "Good battery", C: "Fair battery", D: "Needs service" };
    return letterMap[String(code).toUpperCase()] || `Battery: ${code}`;
  }

  function itemCard(it) {
    const div = document.createElement("div");
    div.className = "card bg-white rounded-2xl border border-slate-200 p-4";
    const title = it.model_name || it.model || "Device";
    const qty = it.quantity && it.quantity > 1 ? it.quantity : null;
    const chips = [];
    if (it.ram) chips.push(`${it.ram} GB RAM`);
    if (it.storage) chips.push(storageLabel(it.storage));
    if (it.cpu) chips.push(it.cpu);
    if (it.display && !(it.model_name || '').includes(it.display)) chips.push(it.display);
    if (it.color) chips.push(it.color);
    const tags = [];
    if (it.grade_a) tags.push(["Grade A", "bg-emerald-100 text-emerald-800"]);
    if (it.has_charger) tags.push(["Charger included", "bg-blue-100 text-blue-800"]);
    if (it.has_touchbar && it.category === "MacBook") tags.push(["Touch Bar", "bg-slate-100 text-slate-700"]);
    const batt = batteryLabel(it.battery_code);

    div.innerHTML = `
      <div class="flex items-start justify-between gap-2 mb-2">
        <h3 class="font-semibold text-slate-900">${title}${it.year ? ` · ${it.year}` : ""}</h3>
        ${qty ? `<span class="text-xs bg-amber-100 text-amber-800 px-2 py-0.5 rounded-full whitespace-nowrap">${qty} available</span>` : ""}
      </div>
      <div class="flex flex-wrap gap-1.5 mb-3">
        ${chips.map(c => `<span class="text-xs bg-slate-100 text-slate-700 px-2 py-0.5 rounded-full">${c}</span>`).join("")}
      </div>
      ${batt ? `<p class="text-sm text-slate-600 mb-2">🔋 ${batt}</p>` : ""}
      <div class="flex flex-wrap gap-1.5">
        ${tags.map(([t, cls]) => `<span class="text-xs ${cls} px-2 py-0.5 rounded-full">${t}</span>`).join("")}
      </div>
    `;
    return div;
  }

  // ---- Filter events ----
  ["search","f-year","f-ram","f-storage","f-charger","f-gradea"].forEach(id => {
    document.getElementById(id).addEventListener("input", renderItems);
    document.getElementById(id).addEventListener("change", renderItems);
  });
  document.getElementById("clear-filters").addEventListener("click", () => {
    ["search","f-year","f-ram","f-storage"].forEach(id => document.getElementById(id).value = "");
    document.getElementById("f-charger").checked = false;
    document.getElementById("f-gradea").checked = false;
    renderItems();
  });
  if (sessionStorage.getItem("catalog_unlocked") === "1") {
    gate.classList.add("hidden"); app.classList.remove("hidden"); renderLevel();
  }
})();
</script>

</body>
</html>
